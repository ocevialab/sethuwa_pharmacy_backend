name: Deploy Backend - QA

on:
  push:
    branches: [qa, develop]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "9.0.x"

      - name: Publish
        run: dotnet publish pharmacyPOS.API.csproj -c Release -o ./publish

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Deploy to VPS, restart API
        run: |
          set -e
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts
          REMOTE="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_QA_API_PATH }}"
          SSH_OPTS='-o BatchMode=yes -o StrictHostKeyChecking=yes'
          rsync -avz --delete -e "ssh $SSH_OPTS" \
            --exclude='appsettings.Production.json' \
            --exclude='appsettings.Development.json' \
            --exclude='Logs/' \
            ./publish/ "$REMOTE"
          ssh $SSH_OPTS "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            'sudo systemctl restart sethuwa-phama-api-qa'
